# Gitleaks configuration
# https://github.com/gitleaks/gitleaks
#
# Note: rule-scoped allowlists must be a TOML *table* (`[rules.allowlist]`),
# not an array of tables (`[[rules.allowlist]]`). The latter decodes as a
# slice and fails with: Rules[N].Allowlist expected a map, got 'slice'.

title = "Gitleaks Config"

[extend]
# Use default gitleaks rules
useDefault = true

[allowlist]
description = "Global allowlist"
paths = [
    '''(^|/)target/''',
    '''(^|/)\.git/''',
    '''Cargo\.lock$''',
    # Test / bench / example fixtures often contain dummy secrets
    '''(^|/)tests/''',
    '''(^|/)benches/''',
    '''(^|/)examples/''',
]
regexes = [
    # Test fixtures with dummy values
    '''(?i)test.*=.*["'][a-z0-9]{32,}["']''',
    # Documentation examples
    '''(?i)example.*key.*=''',
]

[[rules]]
id = "rust-api-key-pattern"
description = "Potential API key in Rust code"
regex = '''(?i)(api[_-]?key|secret[_-]?key|auth[_-]?token)\s*[:=]\s*["'][a-zA-Z0-9]{20,}["']'''
tags = ["key", "API"]

[rules.allowlist]
paths = [
    '''tests/''',
    '''benches/''',
    '''examples/''',
]

[[rules]]
id = "env-credential"
description = "Hardcoded credential in env or config"
regex = '''(?i)(password|passwd|pwd|secret)\s*[:=]\s*["'][^"']{8,}["']'''
tags = ["credential"]
paths = [
    '''\.rs$''',
    '''\.toml$''',
    '''\.yaml$''',
    '''\.yml$''',
]

[rules.allowlist]
paths = [
    '''tests/''',
    '''benches/''',
    '''examples/''',
]
