name: CI

on:
  push:
    branches: [ main, dev, testing ]
  pull_request:
    branches: [ main, dev, testing ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Self-hosted runners share limited RAM across concurrent jobs; candle-core
  # + gemm OOM (SIGKILL/exit 137) under high rustc parallelism.
  CARGO_BUILD_JOBS: "2"
  CARGO_INCREMENTAL: "0"
  # Smaller debug info during CI compiles (still useful for panics).
  CARGO_PROFILE_DEV_DEBUG: "line-tables-only"

jobs:
  fmt:
    name: Format Check
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lint
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test Suite
    # macos uses GitHub-hosted; everything else maps to self-hosted linux
    # (windows matrix labels are intentional fleet mapping, not real Win hosts).
    runs-on: ${{ matrix.os == 'macos-latest' && 'macos-latest' || fromJSON('["self-hosted", "linux", "x64", "podman"]') }}
    strategy:
      fail-fast: true
      # Cap concurrent test jobs so self-hosted memory is not exhausted by
      # parallel candle-core compiles (ubuntu+windows×stable/nightly).
      max-parallel: 2
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      - name: Run tests
        run: cargo test --verbose

  audit:
    name: Security Audit
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit (binary, no source build)
        run: |
          set -euo pipefail
          export PATH="${HOME}/.cargo/bin:${PATH}"
          if command -v cargo-audit >/dev/null 2>&1; then
            cargo audit --version
            exit 0
          fi
          # Prefer prebuilt release binary to avoid OOM from compiling audit deps
          # under concurrent self-hosted CI load (exit 137 on cargo install).
          # Tarball: cargo-audit-x86_64-.../cargo-audit (+ licenses/docs).
          ver="0.22.2"
          asset="cargo-audit-x86_64-unknown-linux-gnu-v${ver}.tgz"
          url="https://github.com/rustsec/rustsec/releases/download/cargo-audit/v${ver}/${asset}"
          mkdir -p "${HOME}/.cargo/bin"
          tmp="$(mktemp -d)"
          curl -fsSL "$url" | tar -xz -C "$tmp"
          bin="$(find "$tmp" -type f -name cargo-audit | head -n1)"
          install -m 0755 "$bin" "${HOME}/.cargo/bin/cargo-audit"
          rm -rf "$tmp"
          echo "${HOME}/.cargo/bin" >> "$GITHUB_PATH"
          cargo audit --version
      - name: Run security audit
        run: cargo audit

  doc:
    name: Documentation Build
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      - name: Build documentation
        run: cargo doc --no-deps --document-private-items
      - name: Check for broken links
        run: cargo doc --no-deps

  # coverage:
  #   name: Code Coverage
  #   runs-on: [self-hosted, linux, x64, podman]
  #   steps:
