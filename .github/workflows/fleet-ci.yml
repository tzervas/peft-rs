# Fleet standard CI — self-hosted. Honest status on trunk via Actions badge.
# Product Test Suite runs on GitHub-hosted (ci.yml) because self-hosted hosts
# SIGKILL candle-core compiles under memory pressure. fleet-ci still exercises
# the self-hosted path with extreme rustc memory limits.
name: fleet-ci

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

concurrency:
  group: fleet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Minimize peak RSS on constrained self-hosted runners.
  CARGO_BUILD_JOBS: "1"
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  RUSTFLAGS: "-C codegen-units=1 -C debuginfo=0"

jobs:
  detect:
    name: detect stack
    runs-on: [self-hosted, linux, x64, podman]
    outputs:
      rust: ${{ steps.d.outputs.rust }}
      python: ${{ steps.d.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - id: d
        run: |
          set -euo pipefail
          rust=false; python=false
          if [ -f Cargo.toml ]; then rust=true; fi
          if [ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f setup.py ]; then python=true; fi
          echo "rust=$rust" >> "$GITHUB_OUTPUT"
          echo "python=$python" >> "$GITHUB_OUTPUT"
          echo "Detected rust=$rust python=$python"

  rust:
    name: cargo check/test
    needs: detect
    if: needs.detect.outputs.rust == 'true'
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4
      - name: free memory snapshot
        run: free -h || true
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo test
        run: cargo test --workspace

  python:
    name: python lint/test
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: Sync dependencies
        run: |
          set -euo pipefail
          if [ -f uv.lock ] || [ -f pyproject.toml ]; then
            # HONEST_CI: fail closed — do not mask sync failures with || true
            if ! uv sync --all-groups; then uv sync; fi
          fi
      - name: Ruff (if configured)
        run: |
          set -euo pipefail
          if [ -f pyproject.toml ] && grep -q '\[tool.ruff' pyproject.toml 2>/dev/null; then
            uv run ruff check . || python -m ruff check .
          else
            echo "ruff not configured — skip"
          fi
      - name: Pytest (if tests exist)
        run: |
          set -euo pipefail
          if [ -d tests ] || [ -d test ]; then
            # HONEST_CI: real exit status; missing pytest → FAIL_ENV (no || echo green)
            if command -v uv >/dev/null 2>&1 && [ -f pyproject.toml ]; then
              uv run pytest -q
            elif command -v pytest >/dev/null 2>&1; then
              pytest -q
            else
              echo "::error title=FAIL_ENV::pytest not available after env setup"
              exit 1
            fi
          else
            echo "no tests/ directory — skip"
          fi

  noop:
    name: fleet-ci stub (no stack — not a product gate)
    needs: detect
    if: needs.detect.outputs.rust != 'true' && needs.detect.outputs.python != 'true'
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - run: |
          echo "::notice title=SKIP_STUB::No Cargo.toml / pyproject detected; fleet-ci stub is not a product gate"
          echo "HONEST_CI class=SKIP_STUB detail=no_stack_detected"
          echo "Add stack files or a product-specific CI job for real coverage."
